name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  packages: write

jobs:
  validate-workflow:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install yamllint
      run: pip install yamllint

    - name: Validate workflow syntax
      run: yamllint .github/workflows/ci.yml
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Run backend tests
      run: |
        cd backend
        pytest tests/ -v --cov=. --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml

  backend-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Install linting tools
      run: |
        pip install black ruff

    - name: Run black check
      run: |
        cd backend
        black --check --diff .

    - name: Run ruff check
      run: |
        cd backend
        ruff check .

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Install Playwright
      run: |
        cd frontend
        npx playwright install --with-deps

    - name: Run E2E tests
      run: |
        cd frontend
        npm run test:e2e

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: playwright-report
        path: frontend/playwright-report/

  frontend-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run ESLint check
      run: |
        cd frontend
        npm run lint:check

    - name: Run Prettier check
      run: |
        cd frontend
        npm run format:check

  docs-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyyaml

    - name: Validate documentation
      run: |
        python3 scripts/validate_docs.py

    - name: Check documentation is up to date
      run: |
        # Export OpenAPI schema
        cd backend
        pip install -r requirements.txt
        python3 export_openapi.py
        cd ..

        # Generate API docs
        python3 scripts/generate_api_docs.py

        # Check for changes
        if ! git diff --quiet docs/; then
          echo "❌ Documentation is out of sync with code"
          echo "Please run ./scripts/build_docs.sh and commit changes"
          git diff docs/
          exit 1
        fi

        echo "✅ Documentation is up to date"

  docker-backend:
    runs-on: ubuntu-latest
    needs: [validate-workflow, backend-tests, backend-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Extract version
      id: extract-version
      run: |
        VERSION=$(grep '^version = ' backend/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile.backend
        push: true
        tags: |
          ghcr.io/leviticus-triage/cerebro-red-v2-backend:latest
          ghcr.io/leviticus-triage/cerebro-red-v2-backend:v${{ steps.extract-version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  docker-frontend:
    runs-on: ubuntu-latest
    needs: [validate-workflow, frontend-tests, frontend-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Extract version
      id: extract-version
      run: |
        VERSION=$(jq -r '.version' frontend/package.json)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push frontend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile.frontend
        push: true
        tags: |
          ghcr.io/leviticus-triage/cerebro-red-v2-frontend:latest
          ghcr.io/leviticus-triage/cerebro-red-v2-frontend:v${{ steps.extract-version.outputs.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

